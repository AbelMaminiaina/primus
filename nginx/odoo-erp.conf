# ═══════════════════════════════════════════════════════════════
# Odoo 17 ERP — Nginx Configuration
# ═══════════════════════════════════════════════════════════════

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name erp.votre-domaine.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.votre-domaine.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/erp.votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.votre-domaine.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client body size for file uploads
    client_max_body_size 200m;

    # Odoo main proxy
    location / {
        proxy_pass http://127.0.0.1:8069;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    # Odoo longpolling
    location /longpolling/ {
        proxy_pass http://127.0.0.1:8072;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Static files cache
    location ~* /web/static/ {
        proxy_cache_valid 200 90d;
        proxy_buffering on;
        proxy_pass http://127.0.0.1:8069;
        expires 90d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Logging
    access_log /var/log/nginx/odoo-erp.access.log;
    error_log /var/log/nginx/odoo-erp.error.log;
}
