# ═══════════════════════════════════════════════════════════════
# PRIMUS Electronics — Nginx Configuration (React SPA)
# ═══════════════════════════════════════════════════════════════

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name shop.votre-domaine.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shop.votre-domaine.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/shop.votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.votre-domaine.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com https://js.stripe.com https://www.paypal.com; style-src 'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com; img-src 'self' data: https: blob:; connect-src 'self' https://erp.votre-domaine.com https://api.stripe.com https://www.paypal.com; frame-src https://js.stripe.com https://www.paypal.com; font-src 'self' https://api.fontshare.com https://fonts.gstatic.com;" always;

    # Root directory
    root /var/www/primus/current/dist;
    index index.html;

    # SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (Vite hashed files)
    location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|jpeg|webp|svg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache sitemap
    location = /sitemap.xml {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Odoo API Proxy
    location /api/odoo/ {
        proxy_pass https://erp.votre-domaine.com/;
        proxy_set_header Host erp.votre-domaine.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass_header Set-Cookie;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # Odoo Images Proxy with cache
    location /web/image/ {
        proxy_pass https://erp.votre-domaine.com/web/image/;
        proxy_set_header Host erp.votre-domaine.com;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Brotli compression (if module installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Logging
    access_log /var/log/nginx/primus-shop.access.log;
    error_log /var/log/nginx/primus-shop.error.log;
}
